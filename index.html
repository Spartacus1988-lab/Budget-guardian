<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>שומר הכסף</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="שומר הכסף">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#040810">
<link rel="apple-touch-icon" id="appleTouchIcon">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══ TOKENS ═══ */
:root{
  --bg:#040810;
  --bg2:#060c16;
  --surface:#0b1829;
  --surface2:#0e1f33;
  --surface3:#122440;
  --border:#1c3350;
  --border2:#243d60;
  --accent:#00d4ff;
  --accent-dim:rgba(0,212,255,.15);
  --accent-glow:rgba(0,212,255,.35);
  --text:#deeeff;
  --text2:#92b4d0;
  --text3:#4a6a88;
  --safe:#00ffaa;
  --safe-dim:rgba(0,255,170,.12);
  --danger:#ff3366;
  --danger-dim:rgba(255,51,102,.15);
  --danger-glow:rgba(255,51,102,.4);
  --warn:#ffaa00;
  --warn-dim:rgba(255,170,0,.12);
  --gold:#ffd700;
  --r-sm:12px;--r-md:18px;--r-lg:24px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ═══ CANVAS BG ═══ */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6;}

/* ═══ LAYOUT ═══ */
.container{max-width:420px;margin:0 auto;padding:12px 14px calc(20px + env(safe-area-inset-bottom)) 14px;padding-top:calc(10px + env(safe-area-inset-top));position:relative;z-index:1;}

/* ═══ HEADER ═══ */
header{text-align:center;padding:14px 0 10px;position:relative;}
.logo-wrap{position:relative;display:inline-block;margin-bottom:4px;}
.logo-icon{font-size:2.8rem;display:block;filter:drop-shadow(0 0 24px rgba(0,212,255,.7));animation:iconFloat 4s ease-in-out infinite;}
@keyframes iconFloat{0%,100%{transform:translateY(0) rotate(0deg)}40%{transform:translateY(-9px) rotate(-3deg)}70%{transform:translateY(-5px) rotate(2deg)}}
.logo-ring{position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(0,212,255,.2);animation:ringPulse 3s ease-in-out infinite;}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.12);opacity:.9}}
.logo-ring2{position:absolute;inset:-16px;border-radius:50%;border:1px solid rgba(0,212,255,.08);animation:ringPulse 3s ease-in-out infinite .8s;}
header h1{font-size:1.6rem;font-weight:900;letter-spacing:-.5px;background:linear-gradient(120deg,var(--accent) 0%,#7ee8ff 50%,var(--text) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.header-sub{color:var(--text3);font-size:.65rem;font-family:'Space Mono',monospace;letter-spacing:2px;margin-top:2px;}

/* ═══ TABS ═══ */
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:4px;}
.tab-btn{padding:9px;border:none;background:none;color:var(--text3);font-family:'Heebo',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;border-radius:var(--r-sm);transition:all .25s;letter-spacing:.3px;display:flex;align-items:center;justify-content:center;gap:5px;}
.tab-btn.active{background:linear-gradient(135deg,rgba(0,212,255,.2),rgba(0,212,255,.08));color:var(--accent);border:1px solid rgba(0,212,255,.28);box-shadow:0 2px 12px rgba(0,212,255,.15);}
.tab-content{display:none;}
.tab-content.active{display:block;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ═══ STREAK ═══ */
.streak-banner{border-radius:var(--r-md);padding:12px 16px;margin-bottom:12px;display:none;align-items:center;gap:12px;position:relative;overflow:hidden;}
.streak-banner::before{content:'';position:absolute;inset:0;opacity:.04;background:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 1px,transparent 8px);}
.streak-banner.good{background:linear-gradient(135deg,rgba(0,255,170,.1),rgba(0,255,170,.03));border:1px solid rgba(0,255,170,.25);}
.streak-banner.bad{background:linear-gradient(135deg,rgba(255,51,102,.1),rgba(255,51,102,.03));border:1px solid rgba(255,51,102,.22);}
.streak-fire{font-size:2rem;animation:firePulse 1.4s ease-in-out infinite;flex-shrink:0;}
@keyframes firePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2) rotate(-5deg)}}
.streak-text{}
.streak-num{font-size:1rem;font-weight:900;}
.streak-banner.good .streak-num{color:var(--safe);}
.streak-banner.bad .streak-num{color:var(--danger);}
.streak-sub{font-size:.68rem;color:var(--text3);margin-top:1px;}

/* ═══ MAIN CARD ═══ */
.budget-card{border-radius:var(--r-lg);padding:20px;margin-bottom:12px;position:relative;overflow:hidden;transition:all .4s;border:1px solid var(--border2);background:linear-gradient(145deg,var(--surface) 0%,var(--surface2) 60%,var(--surface3) 100%);}
.budget-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;transition:all .5s;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.budget-card.safe::before{background:linear-gradient(90deg,transparent,var(--safe),transparent);}
.budget-card.warn::before{background:linear-gradient(90deg,transparent,var(--warn),transparent);}
.budget-card.danger::before{background:linear-gradient(90deg,transparent,var(--danger),transparent);animation:dangerLine .6s ease-in-out infinite;}
@keyframes dangerLine{0%,100%{opacity:1}50%{opacity:.2}}
.budget-card.danger{border-color:rgba(255,51,102,.35);box-shadow:0 0 40px rgba(255,51,102,.12),inset 0 0 60px rgba(255,51,102,.03);}
.budget-card.safe{border-color:rgba(0,255,170,.2);box-shadow:0 0 30px rgba(0,255,170,.06);}
.budget-card.warn{border-color:rgba(255,170,0,.25);}

/* Gloss */
.budget-card::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(to bottom,rgba(255,255,255,.025),transparent);pointer-events:none;border-radius:var(--r-lg) var(--r-lg) 0 0;}

.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.card-label{font-size:.62rem;color:var(--text3);font-family:'Space Mono',monospace;letter-spacing:2.5px;text-transform:uppercase;}
.date-chip{font-size:.62rem;color:var(--text2);font-family:'Space Mono',monospace;background:rgba(255,255,255,.04);border:1px solid var(--border);padding:3px 9px;border-radius:20px;}

.amount-wrap{text-align:center;padding:4px 0 14px;}
.amount-main{font-size:4rem;font-weight:900;letter-spacing:-4px;line-height:1;font-family:'Space Mono',monospace;transition:color .4s;display:inline-block;}
.amount-sub{font-size:.72rem;color:var(--text3);margin-top:4px;}

/* Progress */
.prog-wrap{position:relative;}
.prog-labels{display:flex;justify-content:space-between;font-size:.6rem;color:var(--text3);font-family:'Space Mono',monospace;margin-bottom:6px;}
.prog-track{height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;position:relative;}
.prog-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.34,1.4,.64,1),background .4s;position:relative;}
.prog-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.35) 50%,transparent 100%);animation:progShimmer 1.8s infinite;}
@keyframes progShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ═══ QUICK-ADD PILLS ═══ */
.quick-add{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.quick-pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:.72rem;color:var(--text2);cursor:pointer;transition:all .18s;font-family:'Heebo',sans-serif;font-weight:600;white-space:nowrap;}
.quick-pill:hover,.quick-pill:active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim);transform:scale(1.04);}

/* ═══ STATS ═══ */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:12px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 6px;text-align:center;position:relative;overflow:hidden;transition:all .2s;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--border2);}
.stat-val{font-family:'Space Mono',monospace;font-weight:700;font-size:.95rem;margin-bottom:2px;transition:color .4s;}
.stat-lbl{font-size:.56rem;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;}

/* ═══ ALERTS ═══ */
.alert-panel{border-radius:var(--r-md);padding:16px;margin-bottom:12px;display:none;position:relative;overflow:hidden;}
.alert-panel.show{display:block;animation:alertPop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes alertPop{0%{transform:scale(.3) translateY(80px) rotate(-3deg);opacity:0}55%{transform:scale(1.06) translateY(-4px) rotate(.5deg);opacity:1}75%{transform:scale(.97) translateY(2px)}100%{transform:none;opacity:1}}
.alert-warn{background:linear-gradient(135deg,rgba(255,170,0,.12),rgba(255,170,0,.03));border:1px solid rgba(255,170,0,.35);}
.alert-danger{background:linear-gradient(135deg,rgba(255,51,102,.18),rgba(255,51,102,.04));border:2px solid rgba(255,51,102,.55);box-shadow:0 0 40px rgba(255,51,102,.2),inset 0 0 40px rgba(255,0,40,.03);}
.alert-danger::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,51,102,.015) 20px,rgba(255,51,102,.015) 21px);pointer-events:none;}
.a-icon{font-size:2.2rem;display:block;margin-bottom:6px;animation:aIconBounce .5s ease .5s both;}
@keyframes aIconBounce{0%{transform:rotate(-20deg) scale(.5)}50%{transform:rotate(10deg) scale(1.4)}75%{transform:rotate(-5deg) scale(1.1)}100%{transform:none}}
.a-title{font-size:1.1rem;font-weight:900;margin-bottom:6px;}
.alert-warn .a-title{color:var(--warn);}
.alert-danger .a-title{color:var(--danger);}
.a-msg{font-size:.84rem;line-height:1.7;color:var(--text);}
.a-typing{color:var(--text3);font-size:.76rem;font-family:'Space Mono',monospace;}
.a-typing::after{content:'▋';animation:blink .6s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.a-footer{margin-top:10px;padding:9px 10px;background:rgba(0,0,0,.2);border-radius:9px;font-size:.71rem;color:var(--text3);font-family:'Space Mono',monospace;border:1px solid rgba(255,255,255,.04);}
.a-footer strong{color:var(--safe);display:block;margin-bottom:1px;font-size:.78rem;}

/* ═══ INPUT SECTION ═══ */
.input-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:15px;margin-bottom:12px;}
.sec-title{font-size:.6rem;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:11px;}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:11px;}
.cat-btn{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:10px;padding:8px 4px;color:var(--text3);font-family:'Heebo',sans-serif;font-size:.68rem;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;overflow:hidden;}
.cat-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,.08),transparent);opacity:0;transition:opacity .2s;}
.cat-btn:hover::before,.cat-btn.sel::before{opacity:1;}
.cat-btn:hover{border-color:rgba(0,212,255,.4);color:var(--accent);}
.cat-btn.sel{border-color:var(--accent);color:var(--accent);box-shadow:0 0 14px rgba(0,212,255,.22);}
.cat-btn span:first-child{font-size:1.3rem;}
.input-row{display:flex;gap:8px;align-items:center;}
.inp-wrap{flex:1;position:relative;}
.inp-wrap::before{content:'₪';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-family:'Space Mono',monospace;font-size:.9rem;pointer-events:none;}
.amount-inp{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:12px 34px 12px 12px;color:var(--text);font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;outline:none;transition:all .2s;-webkit-appearance:none;}
.amount-inp:focus{border-color:var(--accent);background:rgba(0,212,255,.04);box-shadow:0 0 0 3px rgba(0,212,255,.08);}
.add-btn{background:linear-gradient(135deg,var(--accent),#0096cc);border:none;border-radius:10px;padding:12px 18px;color:#030810;font-family:'Heebo',sans-serif;font-size:.88rem;font-weight:900;cursor:pointer;transition:all .2s;white-space:nowrap;position:relative;overflow:hidden;}
.add-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);opacity:0;transition:opacity .2s;}
.add-btn:hover::after{opacity:1;}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,212,255,.38);}
.add-btn:active{transform:translateY(0);box-shadow:none;}

/* ═══ TRANSACTIONS ═══ */
.log-section{margin-bottom:12px;}
.log-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.tx-list{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto;padding-right:2px;}
.tx-list::-webkit-scrollbar{width:3px;}
.tx-list::-webkit-scrollbar-track{background:transparent;}
.tx-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.tx-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;animation:txIn .35s cubic-bezier(.34,1.56,.64,1);cursor:default;transition:border-color .15s;}
.tx-item:hover{border-color:var(--border2);}
@keyframes txIn{from{transform:translateX(24px) scale(.95);opacity:0}to{transform:none;opacity:1}}
.tx-left{display:flex;align-items:center;gap:9px;}
.tx-emoji{font-size:1.15rem;line-height:1;}
.tx-name{font-size:.8rem;font-weight:700;}
.tx-time{font-size:.6rem;color:var(--text3);font-family:'Space Mono',monospace;margin-top:1px;}
.tx-amt{font-family:'Space Mono',monospace;font-weight:700;font-size:.9rem;color:var(--danger);}
.empty-tx{text-align:center;padding:24px;color:var(--text3);font-size:.78rem;}
.empty-tx span{display:block;font-size:1.8rem;margin-bottom:6px;opacity:.5;}

/* ═══ CAT BREAKDOWN ═══ */
.breakdown{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-bottom:12px;}
.breakdown-rows{display:flex;flex-direction:column;gap:7px;margin-top:10px;}
.bk-row{display:flex;align-items:center;gap:8px;}
.bk-emoji{font-size:1rem;width:20px;text-align:center;}
.bk-bar-wrap{flex:1;position:relative;height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;}
.bk-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),rgba(0,212,255,.4));transition:width .8s cubic-bezier(.34,1.2,.64,1);}
.bk-amt{font-family:'Space Mono',monospace;font-size:.65rem;color:var(--text2);font-weight:700;min-width:36px;text-align:left;}
.bk-empty{font-size:.72rem;color:var(--text3);text-align:center;padding:8px 0;}

/* ═══ ACTION BUTTONS ═══ */
.actions-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;}
.action-btn{background:none;border:1px solid var(--border);border-radius:var(--r-md);padding:13px 10px;font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:800;cursor:pointer;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden;}
.action-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;}
.action-btn:hover::before{opacity:1;}
.action-btn.new-day{color:var(--accent);border-color:rgba(0,212,255,.28);}
.action-btn.new-day::before{background:linear-gradient(135deg,rgba(0,212,255,.08),transparent);}
.action-btn.new-day:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,212,255,.15);}
.action-btn.clear-day{color:rgba(255,80,100,.85);border-color:rgba(255,51,102,.2);}
.action-btn.clear-day::before{background:linear-gradient(135deg,rgba(255,51,102,.07),transparent);}
.action-btn.clear-day:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,51,102,.12);}

/* ═══ HISTORY ═══ */
.week-chart{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;margin-bottom:12px;}
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:100px;margin-top:12px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
.bar-inner{width:100%;border-radius:5px 5px 0 0;min-height:3px;transition:height .7s cubic-bezier(.34,1.4,.64,1);position:relative;}
.bar-inner.ok{background:linear-gradient(to top,rgba(0,255,170,.7),rgba(0,255,170,.25));}
.bar-inner.over{background:linear-gradient(to top,rgba(255,51,102,.75),rgba(255,51,102,.25));}
.bar-inner.today{background:linear-gradient(to top,var(--accent),rgba(0,212,255,.3));box-shadow:0 0 12px rgba(0,212,255,.3);}
.bar-inner.empty{background:rgba(255,255,255,.04);}
.bar-lbl{font-size:.56rem;color:var(--text3);font-family:'Space Mono',monospace;}
.bar-val{font-size:.56rem;font-family:'Space Mono',monospace;font-weight:700;min-height:9px;}

.month-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;margin-bottom:12px;}
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.ms{text-align:center;}
.ms-val{font-family:'Space Mono',monospace;font-weight:700;font-size:1rem;}
.ms-lbl{font-size:.58rem;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}

.history-list{display:flex;flex-direction:column;gap:7px;margin-bottom:24px;}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;cursor:pointer;transition:all .2s;}
.day-card:hover{border-color:var(--border2);}
.day-card.expanded{border-color:rgba(0,212,255,.28);}
.day-card-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;}
.day-name{font-size:.82rem;font-weight:700;}
.day-right{display:flex;align-items:center;gap:7px;}
.day-amt{font-family:'Space Mono',monospace;font-weight:700;font-size:.88rem;}
.badge{font-size:.6rem;padding:3px 8px;border-radius:20px;font-weight:700;}
.b-ok{background:rgba(0,255,170,.1);color:var(--safe);border:1px solid rgba(0,255,170,.25);}
.b-over{background:rgba(255,51,102,.1);color:var(--danger);border:1px solid rgba(255,51,102,.25);}
.day-body{padding:0 14px 12px;border-top:1px solid var(--border);display:none;flex-direction:column;gap:5px;margin-top:2px;}
.day-card.expanded .day-body{display:flex;}
.mini-row{display:flex;justify-content:space-between;align-items:center;font-size:.75rem;padding-top:5px;}
.mini-left{display:flex;gap:6px;align-items:center;color:var(--text2);}
.mini-amt{font-family:'Space Mono',monospace;color:var(--danger);font-size:.73rem;}
.no-hist{text-align:center;padding:36px 20px;color:var(--text3);}
.no-hist span{display:block;font-size:2rem;margin-bottom:8px;opacity:.3;}

/* ═══ MODAL ═══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;backdrop-filter:blur(6px);}
.modal-bg.show{opacity:1;}
.modal{background:linear-gradient(145deg,var(--surface2),var(--surface3));border:1px solid var(--border2);border-radius:var(--r-lg);padding:24px;max-width:300px;width:88%;box-shadow:0 24px 80px rgba(0,0,0,.7);animation:alertPop .4s cubic-bezier(.34,1.56,.64,1);}
.modal-msg{font-size:.95rem;line-height:1.6;text-align:center;margin-bottom:20px;color:var(--text);}
.modal-btns{display:flex;gap:9px;}
.m-cancel{flex:1;background:none;border:1px solid var(--border2);border-radius:10px;padding:11px;color:var(--text2);font-family:'Heebo',sans-serif;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .2s;}
.m-cancel:hover{border-color:var(--accent);color:var(--accent);}
.m-ok{flex:1;background:linear-gradient(135deg,var(--danger),#cc0033);border:none;border-radius:10px;padding:11px;color:#fff;font-family:'Heebo',sans-serif;font-size:.84rem;font-weight:800;cursor:pointer;transition:all .2s;}
.m-ok:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(255,51,102,.4);}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:calc(28px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(18px);background:var(--surface3);border:1px solid var(--border2);color:var(--text);font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:700;padding:10px 20px;border-radius:30px;z-index:9999;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.03);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══ MISC UTILS ═══ */
.sec-title2{font-size:.6rem;color:var(--text3);letter-spacing:2.5px;text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:10px;}
.clear-sm{background:none;border:1px solid rgba(255,51,102,.22);color:rgba(255,80,100,.7);border-radius:7px;padding:3px 9px;font-size:.65rem;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .2s;}
.clear-sm:hover{background:rgba(255,51,102,.07);border-color:var(--danger);color:var(--danger);}

/* ═══ SCREEN FX ═══ */
@keyframes screenShake{
  0%,100%{transform:translate(0,0)}
  8%{transform:translate(-16px,-10px) rotate(-1.5deg)}
  16%{transform:translate(16px,10px) rotate(1.5deg)}
  24%{transform:translate(-19px,6px) rotate(-2deg)}
  32%{transform:translate(18px,-9px) rotate(2deg)}
  40%{transform:translate(-13px,14px) rotate(-1deg)}
  50%{transform:translate(13px,-10px) rotate(1deg)}
  62%{transform:translate(-8px,6px)}
  74%{transform:translate(5px,-4px)}
  86%{transform:translate(-2px,2px)}
}
@keyframes flashRed{0%,100%{opacity:0}12%{opacity:1}45%{opacity:.5}78%{opacity:.65}}
body.shaking{animation:screenShake .85s cubic-bezier(.36,.07,.19,.97) both;}
.flash-ov{position:fixed;inset:0;z-index:9990;pointer-events:none;background:rgba(255,0,40,.16);animation:flashRed .85s ease forwards;}

@media(max-width:360px){.amount-main{font-size:3.2rem;}.cat-btn span:first-child{font-size:1.1rem;}}
</style>
</head>
<body>

<div class="container">

    <!-- Transactions -->

      <div class="log-header">

  </div><!-- /today -->

  <!-- ══════════ HISTORY ══════════ -->

    </div>

  </div><!-- /history -->

</div><!-- /container -->

<script>
// ════════════════════════════════════
//  ANIMATED BG — particle field
// ════════════════════════════════════
(function(){
  const cv=document.getElementById('bgCanvas');
  const ctx=cv.getContext('2d');
  let W,H,particles=[];
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  function mkParticle(){return{x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.5+.3,a:Math.random()*.5+.1};}
  for(let i=0;i<55;i++)particles.push(mkParticle());
  function draw(){
    ctx.clearRect(0,0,W,H);
    // Draw connections
    for(let i=0;i<particles.length;i++){
      for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x,dy=particles[i].y-particles[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){ctx.beginPath();ctx.strokeStyle=`rgba(0,180,230,${.06*(1-dist/120)})`;ctx.lineWidth=.5;ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();}
      }
    }
    // Draw dots
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;
      if(p.y<0||p.y>H)p.vy*=-1;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,200,220,${p.a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ════════════════════════════════════
//  CONSTANTS & STORAGE
// ════════════════════════════════════
const LIMIT=30;
const SK='budgetGuardian_v3';
const CAT_EMOJI={'קפה':'☕','אוכל בחוץ':'🍔','חטיפים':'🍿','משקאות':'🥤','בגדים':'👕','בידור':'🎮'};
const QUICK_PRESETS=[{label:'קפה ☕',cat:'קפה',amt:14},{label:'ארוחה 🍔',cat:'אוכל בחוץ',amt:35},{label:'חטיף 🍿',cat:'חטיפים',amt:8},{label:'שייק 🥤',cat:'משקאות',amt:20}];

function todayKey(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function loadAll(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch{return{};}}
function saveAll(d){localStorage.setItem(SK,JSON.stringify(d));}
function loadToday(){const a=loadAll(),k=todayKey();return a[k]||{transactions:[],scoldCount:0};}
function saveToday(d){const a=loadAll();a[todayKey()]=d;saveAll(a);}

// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
let dayData=loadToday();
let total=dayData.transactions.reduce((s,t)=>s+t.amount,0);
let selCatName='קפה';
function fmt(n){return n.toFixed(1).replace(/\.0$/,'');}

// ════════════════════════════════════
//  ANIMATED NUMBER COUNTER
// ════════════════════════════════════
let animFrame=null,currentDisplay=total;
function animateTo(target){
  if(animFrame)cancelAnimationFrame(animFrame);
  const start=currentDisplay,diff=target-start,dur=400,t0=performance.now();
  function step(now){
    const p=Math.min((now-t0)/dur,1);
    const ease=1-Math.pow(1-p,3);
    currentDisplay=start+diff*ease;
    document.getElementById('totalAmount').textContent='₪'+fmt(currentDisplay);
    if(p<1)animFrame=requestAnimationFrame(step);
    else{currentDisplay=target;document.getElementById('totalAmount').textContent='₪'+fmt(target);}
  }
  requestAnimationFrame(step);
}

// ════════════════════════════════════
//  TABS
// ════════════════════════════════════
function switchTab(t){
  ['today','history'].forEach(n=>{
    document.getElementById('tab-'+n).classList.toggle('active',n===t);
    document.getElementById('tab'+n.charAt(0).toUpperCase()+n.slice(1)).classList.toggle('active',n===t);
  });
  if(t==='history')renderHistory();
}

// ════════════════════════════════════
//  STREAK
// ════════════════════════════════════
function calcStreak(){
  const all=loadAll();
  const keys=Object.keys(all).filter(k=>k!==todayKey()).sort().reverse();
  let s=0;
  for(const k of keys){if(all[k].transactions.reduce((a,t)=>a+t.amount,0)<=LIMIT)s++;else break;}
  return s;
}
function renderStreak(){
  const s=calcStreak();
  const el=document.getElementById('streakBanner');
  if(s>=2){
    el.style.display='flex';el.className='streak-banner good';
    document.getElementById('streakFire').textContent=s>=7?'🏆':s>=5?'⚡':'🔥';
    document.getElementById('streakNum').textContent=`${s} ימים ברצף בגבול!`;
    document.getElementById('streakSub').textContent=s>=7?'אגדי! אתה מכונה פיננסית!':s>=5?'מדהים! רצף מרשים מאוד':'כל הכבוד — תמשיך כך';
  }else{
    const all=loadAll();const d2=new Date();d2.setDate(d2.getDate()-1);
    const yk=`${d2.getFullYear()}-${String(d2.getMonth()+1).padStart(2,'0')}-${String(d2.getDate()).padStart(2,'0')}`;
    if(all[yk]&&all[yk].transactions.reduce((s2,t)=>s2+t.amount,0)>LIMIT){
      el.style.display='flex';el.className='streak-banner bad';
      document.getElementById('streakFire').textContent='💀';
      document.getElementById('streakNum').textContent='אמש חרגת שוב';
      document.getElementById('streakSub').textContent='הגיע הזמן לשבור את הדפוס — היום!';
    }else el.style.display='none';
  }
}

// ════════════════════════════════════
//  QUICK ADD PRESETS
// ════════════════════════════════════
function renderQuickAdd(){
  const recent=dayData.transactions.slice(-3).reverse();
  const pills=document.getElementById('quickAdd');
  let html='';
  recent.forEach(t=>{
    html+=`<button class="quick-pill" onclick="quickAdd('${t.category}',${t.amount})">${t.emoji} ${t.category} ₪${fmt(t.amount)}</button>`;
  });
  if(!recent.length){
    QUICK_PRESETS.forEach(p=>{
      html+=`<button class="quick-pill" onclick="quickAdd('${p.cat}',${p.amt})">${p.label} ₪${p.amt}</button>`;
    });
  }
  pills.innerHTML=html;
}
function quickAdd(cat,amt){
  document.querySelector(`.cat-btn[data-cat="${cat}"]`)?.click();
  document.getElementById('amountInput').value=amt;
  addExpense();
}

// ════════════════════════════════════
//  CATEGORY BREAKDOWN
// ════════════════════════════════════
function renderBreakdown(){
  const counts={};
  dayData.transactions.forEach(t=>{counts[t.category]=(counts[t.category]||0)+t.amount;});
  const wrap=document.getElementById('breakdownWrap');
  const rows=document.getElementById('breakdownRows');
  if(!dayData.transactions.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  const max=Math.max(...Object.values(counts));
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  rows.innerHTML=sorted.map(([cat,amt])=>`
    <div class="bk-row">
      <span class="bk-emoji">${CAT_EMOJI[cat]||'💸'}</span>
      <div class="bk-bar-wrap"><div class="bk-bar" style="width:${(amt/max)*100}%"></div></div>
      <span class="bk-amt">₪${fmt(amt)}</span>
    </div>`).join('');
}

// ════════════════════════════════════
//  CATEGORY SELECT
// ════════════════════════════════════
function selCat(btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');selCatName=btn.dataset.cat;
}

// ════════════════════════════════════
//  SCREEN FX
// ════════════════════════════════════
function triggerShake(){
  const ex=document.querySelector('.flash-ov');if(ex)ex.remove();
  const ov=document.createElement('div');ov.className='flash-ov';
  document.body.appendChild(ov);setTimeout(()=>ov.remove(),900);
  document.body.classList.remove('shaking');void document.body.offsetWidth;
  document.body.classList.add('shaking');setTimeout(()=>document.body.classList.remove('shaking'),900);
  if(navigator.vibrate)navigator.vibrate([80,40,120,40,200]);
}

// ════════════════════════════════════
//  AI SCOLD
// ════════════════════════════════════
async function getAIScold(ctx){
  const txs=ctx.transactions.map(t=>`${t.emoji}${t.category} ₪${t.amount} ב-${t.time}`).join(', ');
  const catCounts={};
  ctx.transactions.forEach(t=>{catCounts[t.category]=(catCounts[t.category]||0)+1;});
  const topCat=Object.entries(catCounts).sort((a,b)=>b[1]-a[1])[0];

  const sys=ctx.isWarn
    ?`אתה שומר כסף AI קשוח. תפקידך: לגרום למשתמש להפסיק לבזבז לפני שיחרוג. 2-3 משפטים בעברית, סרקסטיים וחדים. אין רחמים.`
    :`אתה שומר כסף AI קשוח ואגרסיבי. המשתמש חרג מגבול ₪30 — זו פעם ${ctx.scoldCount} היום. נזוף בו: ציין את הרכישה הספציפית, חשב הפסד שנתי/חודשי, השווה לחיסכון אמיתי, פגע פסיכולוגית. 3-4 משפטים בעברית. ככל שחרג יותר פעמים — קשה יותר.`;
  const usr=ctx.isWarn
    ?`הוציא ₪${fmt(ctx.total)} מ-₪30 (נותר ₪${fmt(30-ctx.total)}). רכישות: ${txs}. אחרונה: ${ctx.cat} ₪${ctx.amt}.`
    :`חרג! ₪${fmt(ctx.total)} (₪${fmt(ctx.over)} מעל). חריגה #${ctx.scoldCount}. ${topCat?`הכי הרבה: ${topCat[0]} ${topCat[1]}x.`:''} רכישות: ${txs}. אחרונה: ${ctx.cat} ₪${ctx.amt}. חודשי: ₪${ctx.monthly}. שנתי: ₪${ctx.yearly}.`;

  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:[{role:'user',content:usr}]})
    });
    return(await r.json()).content?.[0]?.text||null;
  }catch{return null;}
}

// ════════════════════════════════════
//  SHOW ALERT
// ════════════════════════════════════
async function showAlert(isWarn,ctx){
  const el=document.getElementById(isWarn?'alertWarn':'alertDanger');
  const msgEl=document.getElementById(isWarn?'warnMsg':'dangerMsg');
  const footEl=document.getElementById(isWarn?'warnFooter':'dangerFooter');
  if(!isWarn){
    const lt=["🚨 מנתח את הבזבוז שלך...","😡 מחשב עד כמה אתה גרוע בכסף...","🔴 מכין נזיפה מדויקת...","💀 עוד חריגה?! מנתח..."];
    document.getElementById('dangerTitle').textContent=lt[Math.min(ctx.scoldCount-1,lt.length-1)];
    triggerShake();
  }
  msgEl.innerHTML=`<span class="a-typing">AI מנתח את ההתנהגות שלך</span>`;
  el.classList.remove('show');void el.offsetWidth;el.classList.add('show');
  // Scroll into view
  setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'nearest'}),100);

  const txt=await getAIScold(ctx);
  msgEl.textContent=txt||(isWarn?`הוצאת ₪${fmt(ctx.total)} מ-₪30 — חשוב לפני הרכישה הבאה!`:`חרגת ב-₪${fmt(ctx.over)}! בחודש: ₪${ctx.monthly}. תפסיק!`);

  if(!isWarn){
    const titles=["🚨 עצור! חרגת מהתקציב!","😡 שוב?! מה הבעיה שלך?!","💸 אתה שורף כסף!","🔴 חריגה נוספת — בוש!","😤 אין לך שליטה עצמית?!","🤦 לא מוצלח פיננסית!"];
    document.getElementById('dangerTitle').textContent=titles[Math.min(ctx.scoldCount-1,titles.length-1)];
    footEl.innerHTML=`<strong>📉 הפסד מצטבר:</strong> חודשי: ₪${ctx.monthly} | שנתי: ₪${ctx.yearly}`;
  }else{
    footEl.innerHTML=`<strong>⚡ טיפ:</strong> נותרו ₪${fmt(LIMIT-ctx.total)} — כל שקל עכשיו חשוב!`;
  }
}

// ════════════════════════════════════
//  UPDATE UI
// ════════════════════════════════════
function updateUI(){
  const pct=Math.min((total/LIMIT)*100,100);
  const rem=Math.max(LIMIT-total,0);
  const over=Math.max(total-LIMIT,0);

  animateTo(total);
  document.getElementById('progPct').textContent=Math.round(pct)+'%';
  const fill=document.getElementById('progressFill');
  fill.style.width=pct+'%';

  document.getElementById('statRemaining').textContent='₪'+fmt(rem);
  document.getElementById('statOver').textContent='₪'+fmt(over);
  document.getElementById('statCount').textContent=dayData.transactions.length;

  const card=document.getElementById('budgetCard');
  const wEl=document.getElementById('alertWarn'),dEl=document.getElementById('alertDanger');
  const remEl=document.getElementById('statRemaining');

  if(total>LIMIT){
    card.className='budget-card danger';fill.style.background='var(--danger)';
    document.getElementById('totalAmount').style.color='var(--danger)';
    wEl.classList.remove('show');
    remEl.style.color='var(--danger)';
  }else if(total>=LIMIT*.7){
    card.className='budget-card warn';fill.style.background='var(--warn)';
    document.getElementById('totalAmount').style.color='var(--warn)';
    dEl.classList.remove('show');
    remEl.style.color='var(--warn)';
  }else{
    card.className=total>0?'budget-card safe':'budget-card';
    fill.style.background=total>0?'var(--safe)':'var(--accent)';
    document.getElementById('totalAmount').style.color=total>0?'var(--safe)':'var(--text)';
    wEl.classList.remove('show');dEl.classList.remove('show');
    remEl.style.color=rem>15?'var(--safe)':'var(--text)';
  }

  renderTxList();
  renderBreakdown();
  renderQuickAdd();
  renderStreak();
}

function renderTxList(){
  const list=document.getElementById('txList');
  if(!dayData.transactions.length){
    list.innerHTML='<div class="empty-tx"><span>💸</span>עדיין לא נרשמו רכישות</div>';return;
  }
  list.innerHTML=dayData.transactions.slice().reverse().map(t=>`
    <div class="tx-item">
      <div class="tx-left">
        <span class="tx-emoji">${t.emoji}</span>
        <div><div class="tx-name">${t.category}</div><div class="tx-time">${t.time}</div></div>
      </div>
      <div class="tx-amt">-₪${fmt(t.amount)}</div>
    </div>`).join('');
}

// ════════════════════════════════════
//  ADD EXPENSE
// ════════════════════════════════════
async function addExpense(){
  const input=document.getElementById('amountInput');
  const amount=parseFloat(input.value);
  if(!amount||amount<=0){
    input.style.borderColor='var(--danger)';input.style.boxShadow='0 0 0 3px rgba(255,51,102,.15)';
    setTimeout(()=>{input.style.borderColor='';input.style.boxShadow='';},900);
    return;
  }
  const now=new Date();
  const time=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  dayData.transactions.push({category:selCatName,emoji:CAT_EMOJI[selCatName]||'💸',amount,time});
  total+=amount;input.value='';saveToday(dayData);

  const over=Math.max(total-LIMIT,0);
  const monthly=Math.round(over*30);
  const yearly=Math.round(over*365);
  const isOver=total>LIMIT,isWarn=!isOver&&total>=LIMIT*.7;
  updateUI();
  const ctx={total,over,monthly,yearly,cat:selCatName,amt:amount,scoldCount:dayData.scoldCount,transactions:dayData.transactions,isWarn};
  if(isOver){dayData.scoldCount++;saveToday(dayData);await showAlert(false,ctx);}
  else if(isWarn){await showAlert(true,ctx);}
}

// ════════════════════════════════════
//  MODAL + TOAST
// ════════════════════════════════════
function showToast(msg){
  const ex=document.querySelector('.toast');if(ex)ex.remove();
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),350);},2400);
}
function showModal(msg,okLabel,onOk){
  const ex=document.querySelector('.modal-bg');if(ex)ex.remove();
  const bg=document.createElement('div');bg.className='modal-bg';
  bg.innerHTML=`<div class="modal"><div class="modal-msg">${msg.replace(/\n/g,'<br>')}</div><div class="modal-btns"><button class="m-cancel" onclick="this.closest('.modal-bg').remove()">ביטול</button><button class="m-ok">${okLabel}</button></div></div>`;
  bg.querySelector('.m-ok').onclick=()=>{bg.remove();onOk();};
  bg.onclick=e=>{if(e.target===bg)bg.remove();};
  document.body.appendChild(bg);
  requestAnimationFrame(()=>requestAnimationFrame(()=>bg.classList.add('show')));
}

// ════════════════════════════════════
//  CLEAR / NEW DAY
// ════════════════════════════════════
function resetState(){
  dayData={transactions:[],scoldCount:0};total=0;saveToday(dayData);
  document.getElementById('alertWarn').classList.remove('show');
  document.getElementById('alertDanger').classList.remove('show');
  updateUI();
}
function clearToday(){
  if(!dayData.transactions.length){showToast('אין רכישות למחיקה');return;}
  showModal('🗑️ למחוק את כל הרכישות של היום?','מחיקה',()=>{resetState();showToast('נמחק ✓');});
}
function startNewDay(){
  showModal('🌅 להתחיל יום חדש?\nהנתונים יישמרו בהיסטוריה.','אפס יום',()=>{resetState();showToast('יום חדש התחיל! 🌅');});
}

// ════════════════════════════════════
//  HISTORY
// ════════════════════════════════════
function renderHistory(){
  const all=loadAll();
  const keys=Object.keys(all).sort().reverse();
  renderWeekChart(all);
  renderMonthSummary(all,keys);
  renderDayCards(all,keys);
}
function renderWeekChart(all){
  const con=document.getElementById('weekChart');
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    days.push({k,lbl:['א','ב','ג','ד','ה','ו','ש'][d.getDay()],isToday:i===0});
  }
  const amts=days.map(d=>all[d.k]?all[d.k].transactions.reduce((s,t)=>s+t.amount,0):0);
  const mx=Math.max(LIMIT*1.6,...amts,.1);
  con.innerHTML=days.map(({k,lbl,isToday},i)=>{
    const sp=amts[i];
    const pct=sp>0?(sp/mx)*100:0;
    const cls=isToday?'today':sp===0?'empty':sp>LIMIT?'over':'ok';
    const col=isToday?'var(--accent)':sp===0?'var(--text3)':sp>LIMIT?'var(--danger)':'var(--safe)';
    return`<div class="bar-col">
      <div class="bar-val" style="color:${col}">${sp>0?'₪'+Math.round(sp):''}</div>
      <div style="flex:1;width:100%;display:flex;align-items:flex-end;">
        <div class="bar-inner ${cls}" style="width:100%;height:${Math.max(pct,sp>0?8:3)}%"></div>
      </div>
      <div class="bar-lbl" style="color:${isToday?'var(--accent)':'var(--text3)'}">${lbl}</div>
    </div>`;
  }).join('');
}
function renderMonthSummary(all,keys){
  const now=new Date();
  const pre=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const mk=keys.filter(k=>k.startsWith(pre));
  const good=mk.filter(k=>all[k].transactions.reduce((s,t)=>s+t.amount,0)<=LIMIT).length;
  const tot=mk.reduce((s,k)=>s+all[k].transactions.reduce((ss,t)=>ss+t.amount,0),0);
  document.getElementById('msDays').textContent=mk.length;
  document.getElementById('msGood').textContent=good;
  document.getElementById('msTotal').textContent='₪'+Math.round(tot);
}
function renderDayCards(all,keys){
  const c=document.getElementById('histList');
  if(!keys.length){c.innerHTML='<div class="no-hist"><span>📭</span>אין היסטוריה עדיין</div>';return;}
  const dn=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  c.innerHTML=keys.map(k=>{
    const d=all[k],sp=d.transactions.reduce((s,t)=>s+t.amount,0),over=sp>LIMIT;
    const dt=new Date(k+'T12:00:00');
    const lbl=`יום ${dn[dt.getDay()]} ${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}`;
    const badge=over?`<span class="badge b-over">+₪${fmt(sp-LIMIT)}</span>`:`<span class="badge b-ok">בגבול ✓</span>`;
    const items=d.transactions.length
      ?d.transactions.map(t=>`<div class="mini-row"><div class="mini-left"><span>${t.emoji}</span><span>${t.category}</span><span style="font-size:.58rem;opacity:.5">${t.time}</span></div><div class="mini-amt">-₪${fmt(t.amount)}</div></div>`).join('')
      :'<div style="font-size:.73rem;color:var(--text3);padding-top:5px">אין רכישות</div>';
    return`<div class="day-card" onclick="this.classList.toggle('expanded')">
      <div class="day-card-hdr">
        <div class="day-name">${lbl}</div>
        <div class="day-right"><div class="day-amt" style="color:${over?'var(--danger)':'var(--safe)'}">${over?'⚠ ':''}₪${fmt(sp)}</div>${badge}</div>
      </div>
      <div class="day-body">${items}</div>
    </div>`;
  }).join('');
}

// ════════════════════════════════════
//  PWA
// ════════════════════════════════════
(function(){
  const cv2=document.createElement('canvas');cv2.width=cv2.height=180;
  const c2=cv2.getContext('2d');
  const g=c2.createLinearGradient(0,0,180,180);
  g.addColorStop(0,'#040810');g.addColorStop(1,'#0b1829');
  c2.fillStyle=g;c2.beginPath();c2.roundRect(0,0,180,180,36);c2.fill();
  const g2=c2.createRadialGradient(90,70,5,90,70,100);
  g2.addColorStop(0,'rgba(0,212,255,.18)');g2.addColorStop(1,'transparent');
  c2.fillStyle=g2;c2.fillRect(0,0,180,180);
  c2.font='96px serif';c2.textAlign='center';c2.textBaseline='middle';c2.fillText('🛡️',90,94);
  document.getElementById('appleTouchIcon').href=cv2.toDataURL();
  if('serviceWorker' in navigator){
    const sw=`const C='bgv4';const A=[self.location.pathname];self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(A))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(self.location.pathname)))));self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k))))));`;
    const b=URL.createObjectURL(new Blob([sw],{type:'application/javascript'}));
    navigator.serviceWorker.register(b).catch(()=>{});
  }
})();

document.getElementById('amountInput').addEventListener('keydown',e=>{if(e.key==='Enter')addExpense();});
(function(){
  const d=new Date();
  const dn=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  document.getElementById('dateDisplay').textContent=`יום ${dn[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`;
